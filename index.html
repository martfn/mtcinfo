<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>MTC – 2.º Semestre</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --purple:        #a855f7;
      --purple-bright: #c084fc;
      --green:         #22c55e;
      --green-bright:  #4ade80;
      --text-main:     #f5f5f7;
      --text-muted:    #a0a0b2;
      --font-main: system-ui, -apple-system, BlinkMacSystemFont,
                   "SF Pro Text", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background: radial-gradient(circle at top left, #1e1333 0, #050507 55%, #000 100%);
      color: var(--text-main);
      line-height: 1.5;
      padding: 24px 16px 48px;
    }

    .page { max-width: 880px; margin: 0 auto; }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--purple), var(--green));
      color: #050507;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .tag span { width: 6px; height: 6px; border-radius: 999px; background: #050507; }

    h1 { font-size: 28px; letter-spacing: 0.04em; text-transform: uppercase; }

    .subtitle { font-size: 13px; color: var(--text-muted); }

    .top-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
      gap: 18px;
      align-items: flex-start;
    }

    .stack { display: flex; flex-direction: column; gap: 18px; }

    @media (max-width: 720px) {
      header    { flex-direction: column; align-items: flex-start; }
      .top-grid { grid-template-columns: minmax(0, 1fr); }
      .grid     { grid-template-columns: minmax(0, 1fr); }
    }

    .card {
      background: rgba(8, 8, 18, 0.92);
      border-radius: 16px;
      padding: 14px 16px 16px;
      border: 1px solid rgba(168, 85, 247, 0.15);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(26px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
      gap: 10px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--purple-bright);
    }

    .card-title-dot {
      width: 8px; height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
    }

    .card-meta {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    ul { list-style: none; font-size: 14px; color: var(--text-main); }

    li {
      padding-left: 16px;
      position: relative;
      margin-bottom: 6px;
      line-height: 1.6;
    }

    li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--green);
      font-weight: bold;
    }

    li:last-child { margin-bottom: 0; }

    .date       { color: var(--green-bright); font-weight: 600; }
    .percentage { color: var(--purple-bright); font-weight: 600; }
    .emphasis   { color: var(--text-main); font-weight: 600; }
    .muted      { color: var(--text-muted); }

    .highlight {
      color: var(--green-bright);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 13px;
    }

    .note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-style: italic;
      line-height: 1.5;
    }

    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin: 16px 0 8px;
      font-weight: 600;
    }

    .timeline     { display: grid; gap: 2px; font-size: 13px; }
    .timeline-row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; }
    .timeline-label { color: var(--text-muted); font-weight: 500; }
    .timeline-value { text-align: right; color: var(--text-main); font-weight: 600; }

    .pending { color: var(--text-muted); font-style: italic; font-size: 13px; }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <div>
        <div class="tag"><span></span>MTC - UA</div>
        <h1>Datas importantes</h1>
      </div>
      <div class="subtitle">
        Atualizado regularmente porque n tenho mais nada para fazer da vida.<br>
        Site feito com IA. Não digam ao caixinha
      </div>
    </header>

    <div class="top-grid">
      <section class="card">
        <div class="card-header">
          <div class="card-title"><div class="card-title-dot"></div>Informações Gerais</div>
        </div>
        <div class="timeline" id="timeline-gerais">
          <div style="color:var(--text-muted);font-size:13px;font-style:italic;">A carregar...</div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="card-title"><div class="card-title-dot"></div>Próximas 2 semanas</div>
          <div class="card-meta">Preenchido automaticamente</div>
        </div>
        <ul id="upcoming-list"></ul>
        <p class="note" id="upcoming-note">
          Lista atualizada automaticamente com base na data de hoje.
        </p>
      </section>
    </div>

    <div class="grid">
      <div class="stack" id="col-left"></div>
      <div class="stack" id="col-right"></div>
    </div>

  </div>

  <script>
    const SUBJECTS = [
      { id: "LM2", name: "Lab. Multimédia 2",       col: "left"  },
      { id: "CI",  name: "Cognição e Interação",     col: "left",
        note: "<span class='emphasis'>Info. Testes:</span> Feitos no computador, nota mínima de 8 na média dos 2 testes. Possivelmente escolha múltipla." },
      { id: "SC",  name: "Semiótica da Comunicação", col: "left",
        note: "Nota mínima exs. práticos: <span class='emphasis'>10 valores</span>" },
      { id: "VD",  name: "Vídeo Digital",            col: "right" },
      { id: "G",   name: "Guionismo",                col: "right" },
    ];

    function formatPtDate(dateObj) {
      const d = String(dateObj.getDate()).padStart(2, "0");
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      return `${d}/${m}`;
    }

    function renderDateLabel(e) {
      if (e.porMarcar) return `<span class="highlight">Por marcar</span>`;
      const prefix = e.unconfirmed ? "~" : "";
      const d      = new Date(e.date + "T00:00:00");
      const time   = e.time ? `, ${e.time}` : "";
      const cls    = e.unconfirmed ? "highlight" : "date";
      return `<span class="${cls}">${prefix}${formatPtDate(d)}${time}</span>`;
    }

    function renderEventLi(e) {
  const pct      = e.pct  ? ` <span class="percentage">(${e.pct}%)</span>` : "";
  const type     = e.type ? ` <span class="muted">· ${e.type}</span>`      : "";
  const labelHtml = e.link
    ? `<a href="${e.link}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.2);">${e.label}</a>`
    : e.label;
  return `<li>${renderDateLabel(e)} – ${labelHtml}${pct}${type}</li>`;
}


    // ── Informações Gerais ───────────────────────────────────────
    // Built from events.json entries where subject=Geral, display=info
    function buildInfoGerais(entries) {
  const el = document.getElementById("timeline-gerais");
  if (!entries.length) {
    el.innerHTML = `<div style="color:var(--text-muted);font-size:13px;font-style:italic;">Sem informações gerais.</div>`;
    return;
  }
  el.innerHTML = entries.map(e => {
    const valueHtml = e.link
      ? `<a href="${e.link}" target="_blank" rel="noopener" style="color:var(--green-bright);font-weight:600;text-decoration:none;border-bottom:1px solid rgba(74,222,128,0.4);">${e.value}</a>`
      : e.value;
    return `
      <div class="timeline-row">
        <div class="timeline-label">${e.label}</div>
        <div class="timeline-value">${valueHtml}</div>
      </div>`;
  }).join("");
}


    // ── Subject cards ────────────────────────────────────────────
    function buildSubjectCards(events) {
      const colLeft  = document.getElementById("col-left");
      const colRight = document.getElementById("col-right");

      SUBJECTS.forEach(subj => {
        const all     = events.filter(e => e.subject === subj.id);
        const normal  = all.filter(e => !e.section);
        const recurso = all.filter(e => e.section === "Recurso");

        let inner = "";
        if (normal.length === 0 && recurso.length === 0) {
          inner = `<p class="pending">(Por enquanto, sem info)</p>`;
        } else {
          if (normal.length)  inner += `<ul>${normal.map(renderEventLi).join("")}</ul>`;
          if (recurso.length) inner += `<div class="section-label">Recurso</div><ul>${recurso.map(renderEventLi).join("")}</ul>`;
        }
        if (subj.note) inner += `<p class="note">${subj.note}</p>`;

        const card = document.createElement("section");
        card.className = "card";
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title"><div class="card-title-dot"></div>${subj.id}</div>
            <div class="card-meta">${subj.name}</div>
          </div>${inner}`;
        (subj.col === "left" ? colLeft : colRight).appendChild(card);
      });
    }

    // ── Upcoming list ────────────────────────────────────────────
    function buildUpcoming(events) {
      const listEl = document.getElementById("upcoming-list");
      const noteEl = document.getElementById("upcoming-note");
      if (!listEl) return;

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const inTwoWeeks = new Date(today);
      inTwoWeeks.setDate(inTwoWeeks.getDate() + 14);

      const upcoming = events
        .filter(e => !e.porMarcar && !e.recursoOnly && e.date && e.display !== "info")
        .map(e => ({ ...e, d: new Date(e.date + "T00:00:00") }))
        .filter(e => e.d >= today && e.d <= inTwoWeeks)
        .sort((a, b) => a.d - b.d);

      listEl.innerHTML = "";

      if (upcoming.length === 0) {
        const li = document.createElement("li");
        li.textContent = "Nada marcado nos próximos 14 dias. Aproveita para descansar e pagar um café aos teus representantes de curso favoritos.";
        li.style.color     = "var(--text-muted)";
        li.style.fontStyle = "italic";
        listEl.appendChild(li);
        if (noteEl) noteEl.style.display = "none";
        return;
      }

      upcoming.forEach(e => {
        const li             = document.createElement("li");
        const spanDate       = document.createElement("span");
        spanDate.className   = "date";
        const prefix         = e.unconfirmed ? "~" : "";
        const time           = e.time ? `, ${e.time}` : "";
        spanDate.textContent = prefix + formatPtDate(e.d) + time;
        li.appendChild(spanDate);
        const subj = e.subject !== "Geral" ? ` ${e.subject} –` : "";
        li.insertAdjacentText("beforeend", `${subj} ${e.label}`);
        listEl.appendChild(li);
      });
    }

    // ── Init ─────────────────────────────────────────────────────
    async function init() {
      let events = [];
      try {
        const res = await fetch("events.json");
        if (!res.ok) throw new Error();
        events = await res.json();
      } catch {
        console.warn("events.json não encontrado.");
      }

      // Split info entries from regular events
      const infoEntries = events.filter(e => e.subject === "Geral" && e.display === "info");
      const restEvents  = events.filter(e => e.display !== "info");

      buildInfoGerais(infoEntries);
      buildSubjectCards(restEvents);
      buildUpcoming(restEvents);
    }

    init();
  </script>
</body>
</html>
